# M&A due diligence policy — stricter thresholds than vendor onboarding.
# PolicyAgent reads this file; no mode literals appear in agent code.

weights:
  low: 1
  medium: 4
  high: 10
  critical: 25

# RiskScoreAgent thresholds (0-100 overall score → traffic-light verdict)
# M&A is stricter than vendor.
risk_score_thresholds:
  green_max: 20
  amber_max: 59

verdict:
  reject_if_any_critical: true   # any critical finding blocks the deal
  reject_above: 29               # score > 29 (≥ 3× high) → block
  conditional_above: 9           # score > 9 (≥ 1× high) → conditional

critical_categories:
  - going-concern
  - ip
  - code-risk
  - sql-injection
  - ssrf
  - net-zero-commitment
  - modern-slavery-statement
  - anti-corruption-policy
