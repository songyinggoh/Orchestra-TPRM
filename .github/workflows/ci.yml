name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Non-blocking: 140 pre-existing errors across 46 files — tracked for cleanup
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,server,storage,security,messaging,memory,routing,telemetry,cache,qdrant,nats,anthropic,google]"
      - run: mypy src/orchestra/

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Full history for Gitleaks

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bandit Scan (SAST)
        run: |
          pip install bandit
          bandit -r src/ -ll -ii -c pyproject.toml

      - name: pip-audit Scan (SCA)
        run: |
          pip install pip-audit
          pip install -e ".[dev,server,telemetry,cache,storage,postgres,nats,security,messaging,memory,routing,promptshield]"
          pip-audit \
            --ignore-vuln GHSA-w8v5-vhqr-4h9v \
            --ignore-vuln CVE-2026-1839  # transformers — fix only in pre-release 5.0.0rc3

  unit-test:
    name: Unit Test (${{ matrix.os }}, Py ${{ matrix.python-version }})
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev,server,telemetry,cache,storage,postgres,nats,security,memory,routing]"

      - name: Run unit tests
        run: |
          pytest tests/unit/ tests/security/ --cov=orchestra --cov-report=xml -x

      - uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  tprm-test:
    name: TPRM Tests (Linux, Py 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: pip install -e ".[dev,tprm,server,storage,telemetry]"
      - name: Run TPRM tests
        run: pytest tests/tprm/ -q --tb=short

  ui-build:
    name: UI Build (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: src/orchestra/ui
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/orchestra/ui/package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm run build

  dashboard-build:
    name: TPRM Dashboard Build (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build

  integration-test:
    name: Integration & Security Tests (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password # gitleaks:allow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - name: Docker login
        if: ${{ secrets.DOCKER_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Start NATS with JetStream
        run: |
          docker run -d --name nats -p 4222:4222 -p 8222:8222 nats:latest -js -sd /tmp/nats -m 8222
          # Wait for NATS client port
          for i in $(seq 1 30); do nc -z localhost 4222 && break || sleep 1; done
          # Wait for JetStream to be fully ready (monitoring endpoint)
          for i in $(seq 1 15); do curl -sf http://localhost:8222/jsz > /dev/null 2>&1 && break || sleep 1; done
          echo "NATS JetStream ready"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev,server,telemetry,cache,storage,postgres,nats,security,memory,routing,redis,messaging]"

      - name: Run integration & security tests
        env:
          DATABASE_URL: "postgresql://user:password@localhost:5432/test_db"
          REDIS_URL: "redis://localhost:6379"
          NATS_URL: "nats://localhost:4222"
        run: |
          pytest tests/integration/ tests/security/ -x
