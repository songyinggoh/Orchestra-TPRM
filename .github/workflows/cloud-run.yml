name: Deploy to Cloud Run

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      region:
        description: "Cloud Run region"
        default: "asia-southeast1"
        required: false

permissions:
  contents: read
  id-token: write  # required for Workload Identity Federation

concurrency:
  group: cloud-run-deploy
  cancel-in-progress: false  # never cancel a deploy mid-flight

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE: orchestra-tprm
  REGION: ${{ github.event.inputs.region || 'asia-southeast1' }}
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/orchestra-tprm

jobs:
  tprm-gate:
    name: TPRM Tests (gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -e ".[dev,tprm,server,storage,telemetry]"
      - run: pytest tests/tprm/ -q --tb=short

  dashboard-gate:
    name: Dashboard Build (gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build

  deploy:
    name: Build & Deploy
    needs: [tprm-gate, dashboard-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build dashboard (embed into image)
        working-directory: dashboard
        run: |
          npm ci
          npm run build

      - name: Build and push Docker image
        run: |
          docker build \
            --tag "$IMAGE:${{ github.sha }}" \
            --tag "$IMAGE:latest" \
            .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: >-
            --min-instances=1
            --max-instances=10
            --concurrency=80
            --cpu=2
            --memory=2Gi
            --timeout=900
            --allow-unauthenticated
          env_vars: |
            GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}
            BQ_DATASET=tprm_audit
            BQ_TABLE=tprm_findings
          secrets: |
            GOOGLE_API_KEY=GOOGLE_API_KEY:latest
            SHEETS_VENDOR_TEMPLATE_ID=SHEETS_VENDOR_TEMPLATE_ID:latest
            DOCS_MA_TEMPLATE_ID=DOCS_MA_TEMPLATE_ID:latest
            DRIVE_VENDOR_FOLDER_ID=DRIVE_VENDOR_FOLDER_ID:latest
            DRIVE_MA_FOLDER_ID=DRIVE_MA_FOLDER_ID:latest

      - name: Show service URL
        run: |
          echo "Deployed: $(gcloud run services describe $SERVICE --region $REGION --format='value(status.url)')"
