# alembic.ini — Orchestra TPRM Alembic configuration
#
# sqlalchemy.url is intentionally left blank; the actual URL is read from
# the DATABASE_URL environment variable inside migrations/env.py.
# This keeps credentials out of version control.

[alembic]
script_location = migrations
prepend_sys_path = .

# sqlalchemy.url = (set via DATABASE_URL env var in env.py)

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
